services:
  - type: web
    name: sponsorship-approval-api
    runtime: docker
    dockerfilePath: ./SponsorshipApproval.Api/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Cors__AllowedOrigins__0
        sync: false
      - key: Jwt__SigningKey
        generateValue: true
