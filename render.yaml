databases:
  - name: sponsorship-approval-db
    databaseName: sponsorship_approval
    user: sponsorship_approval_user

services:
  - type: web
    name: sponsorship-approval-api
    runtime: docker
    dockerfilePath: ./SponsorshipApproval.Api/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: sponsorship-approval-db
          property: connectionString
      - key: Cors__AllowedOrigins__0
        sync: false
      - key: Jwt__SigningKey
        generateValue: true
